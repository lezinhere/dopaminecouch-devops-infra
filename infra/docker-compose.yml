version: "3.8"

services:

  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ******
      MYSQL_DATABASE:*****
      MYSQL_USER: *****
      MYSQL_PASSWORD: *****
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - prod_net

  backend:
    build:
      context: ./doc-be-python
    container_name: backend
    command: bash -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./doc-be-python:/code
    ports:
      - "8000:8000"
    env_file:
      - ./doc-be-python/.env
    depends_on:
      - db
    restart: always
    networks:
      - prod_net
 nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    restart: always
    networks:
      - prod_net

volumes:
  mysql_data:

networks:
  prod_net:
    external: true